name: Notify site repo of content update

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger submodule bump in site repo
        env:
          GH_TOKEN: ${{ secrets.SITE_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "SITE_REPO_TOKEN secret not set — skipping dispatch."
            exit 0
          fi
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/selvaganapathyc/startupengineering-site/dispatches \
            -d '{"event_type":"content-updated","client_payload":{"sha":"${{ github.sha }}"}}'
