variants:
  # Pattern A: Selva-authored local variant.
  - id: selva-topic-slug
    name: Variant name
    author: Selva
    author_type: individual
    context_fit: "When this variant fits. Written by Selva regardless of author."
    last_verified: 2026-04-19
    layers:
      skill: ./selva-topic-slug/skill.md
    tags: []

